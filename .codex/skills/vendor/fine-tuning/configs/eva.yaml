# EVA: Explained Variance Adaptation
# Data-driven initialization — uses SVD of actual activations (not just weights)
# to adapt rank allocation per layer based on your specific dataset.
# SOTA init method; combining EVA + DoRA can exceed full fine-tuning.
#
# Use with: set init_lora_weights: "eva" in your trainer config.yaml
# Best for: Small datasets where data-efficient init matters most
# VRAM: Same as standard LoRA + small overhead for activation SVD at init
# Paper: https://arxiv.org/abs/2410.07170
#
# UNSLOTH COMPAT: BLOCKED
#   Unsloth validates init_lora_weights against an allowlist:
#     [True, False, "gaussian", "loftq", "corda"]
#   "eva" is NOT in the list and will raise ValueError.
#   To use EVA you must bypass Unsloth and use PEFT's get_peft_model()
#   directly. EVA additionally needs a small dataloader pass at init time
#   (PEFT handles this automatically via get_eva_state_dict()).
#
# ADVANCED: Combine with DoRA for best results:
#   init_lora_weights: "eva"
#   use_dora: true

r: 64
lora_alpha: 128
# init_lora_weights: "eva"  # BLOCKED by Unsloth — see note above
